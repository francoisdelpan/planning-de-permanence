<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root {
      --brand: #2F5AEA;
      --brand-dark: #2447bb;
      --brand-soft: #eef3ff;
      --text: #162033;
      --muted: #6b7280;
      --border: #d9e2ff;
      --success: #2e7d32;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: var(--text);
    }

    .page {
      padding: 18px 22px 18px;
    }

    .section-title {
      display: block;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .field-card,
    .info-card {
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .info-card {
      background: var(--brand-soft);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .info-card strong {
      color: var(--brand);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    select {
      width: 100%;
      padding: 11px 12px;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(47, 90, 234, 0.12);
      outline: none;
    }

    .primary-button {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(47, 90, 234, 0.22);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .primary-button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .signature {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: var(--brand);
    }

    .signature a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    #loaderOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255,255,255,0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .loader-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
      max-width: 420px;
      text-align: center;
      line-height: 1.5;
      white-space: pre-line;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(47, 90, 234, 0.2);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="page">
    <span class="section-title">Synchronisation</span>

    <div class="info-card">
      Vous êtes connecté en tant que : <strong id="userName">...</strong>
    </div>

    <div class="field-card">
      <label for="sheetSelect">Feuille à synchroniser</label>
      <select id="sheetSelect"></select>
    </div>

    <button class="primary-button" onclick="syncSheet()">Synchroniser</button>

    <div class="signature">
      <span>Made with &lt;3 by <a href="https://utema.fr" target="_blank">Utema</a>. 2026</span>
    </div>
  </div>

  <div id="loaderOverlay">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div id="loaderMessage">Chargement…</div>
    </div>
  </div>

  <script>
    function showLoader(text) {
      document.getElementById("loaderMessage").innerText = text || "Chargement…";
      document.getElementById("loaderOverlay").style.display = "flex";
    }

    function hideLoader() {
      document.getElementById("loaderOverlay").style.display = "none";
    }

    function showUser() {
      google.script.run.withSuccessHandler(function(email) {
        document.getElementById("userName").innerText = email || "Utilisateur inconnu";
      }).getActiveUserEmail();
    }

    function populateSheets() {
      showLoader("Chargement des feuilles…");
      google.script.run.withSuccessHandler(function(sheetNames) {
        const select = document.getElementById("sheetSelect");
        select.innerHTML = "";

        sheetNames.forEach(name => {
          select.appendChild(new Option(name, name));
        });

        hideLoader();
      }).getSyncableSheets();
    }

    function syncSheet() {
      const sheet = document.getElementById("sheetSelect").value;
      if (!sheet) return;

      showLoader("Mise à jour de la DB…");
      google.script.run
        .withSuccessHandler(res => {
          showLoader(
            `DB synchronisée : ${res.successCount} ✓, ${res.failCount} ✗\n` +
            `${res.remaining} modif(s) en attente – lancement de la sync Calendar…`
          );

          google.script.run
            .withSuccessHandler(stats => {
              showLoader(
                `Calendrier synchronisé : ${stats.success} ✓, ${stats.failed} ✗\n` +
                `Fermeture automatique…`
              );
              setTimeout(() => google.script.host.close(), 1500);
            })
            .syncGoogleCalendarsForUser();
        })
        .triggerFullSyncForUser(sheet);
    }

    window.onload = function() {
      showUser();
      populateSheets();
    };
  </script>
</body>
</html>
