<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        --brand: #2F5AEA;
        --brand-dark: #2447bb;
        --brand-soft: #eef3ff;
        --text: #162033;
        --muted: #6b7280;
        --border: #d9e2ff;
        --danger: #c62828;
        --success: #2e7d32;
        --success-dark: #256528;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #fff;
        color: var(--text);
      }

      .page {
        padding: 18px 22px 18px;
      }

      .section-title {
        display: block;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--brand);
      }

      .field-card {
        margin-bottom: 14px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #fff;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      select,
      input[type="text"] {
        width: 100%;
        padding: 11px 12px;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      select:focus,
      input[type="text"]:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px rgba(47, 90, 234, 0.12);
        outline: none;
      }

      .inline-row {
        display: flex;
        gap: 10px;
        align-items: end;
        margin-bottom: 14px;
      }

      .inline-row .input-grow {
        flex: 1;
      }

      .inline-row .button-wrap {
        flex: 0 0 auto;
      }

      .button-add,
      .button-save {
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      .button-add {
        background: var(--brand);
        color: #fff;
        box-shadow: 0 10px 24px rgba(47, 90, 234, 0.18);
      }

      .button-add:hover:not([disabled]) {
        background: var(--brand-dark);
        transform: translateY(-1px);
      }

      .button-save {
        width: 100%;
        background: var(--success);
        color: #fff;
        box-shadow: 0 10px 24px rgba(46, 125, 50, 0.18);
      }

      .button-save:hover:not([disabled]) {
        background: var(--success-dark);
        transform: translateY(-1px);
      }

      button[disabled] {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .email-list {
        margin: 0 0 14px;
        padding-left: 0;
        list-style: none;
      }

      .email-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--brand-soft);
        font-size: 13px;
        color: var(--text);
      }

      .email-remove {
        border: none;
        background: transparent;
        color: var(--danger);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        padding: 0;
        box-shadow: none;
      }

      .email-remove:hover {
        text-decoration: none;
        transform: none;
        background: transparent;
      }

      .signature {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: var(--brand);
      }

      .signature a {
        color: inherit;
        text-decoration: none;
        font-weight: 700;
      }

      #loaderOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255,255,255,0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .loader-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--brand-soft);
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 3px solid rgba(47, 90, 234, 0.2);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @media (max-width: 640px) {
        .inline-row {
          flex-direction: column;
          align-items: stretch;
        }

        .button-add {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <span class="section-title">Calendriers</span>

      <div class="field-card">
        <label for="collabSelect">Collaborateur</label>
        <select id="collabSelect" onchange="onSelectChange()"></select>
      </div>

      <div class="field-card">
        <label for="calendarInput">Ajouter une adresse Calendar</label>
        <div class="inline-row">
          <div class="input-grow">
            <input type="text" id="calendarInput" />
          </div>
          <div class="button-wrap">
            <button class="button-add" onclick="addEmail()">➕ Ajouter</button>
          </div>
        </div>

        <ul id="emailList" class="email-list"></ul>
      </div>

      <button id="saveBtn" class="button-save" onclick="saveCalendar()">Sauvegarder</button>

      <div class="signature">
        <span>Made with &lt;3 by <a href="https://utema.fr" target="_blank">Utema</a>. 2026</span>
      </div>
    </div>

    <div id="loaderOverlay">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div id="loaderMessage">Chargement…</div>
      </div>
    </div>

    <script>
      let originalEmails = [];
      let currentName = '';

      function showLoader(message = "Chargement…") {
        document.getElementById("loaderMessage").innerText = message;
        document.getElementById("loaderOverlay").style.display = "flex";
      }

      function hideLoader() {
        document.getElementById("loaderOverlay").style.display = "none";
      }

      function loadCollaborators() {
        showLoader("Chargement des collaborateurs…");
        google.script.run.withSuccessHandler(function(collaborators) {
          const select = document.getElementById('collabSelect');
          select.innerHTML = '';

          collaborators.forEach(({ name, email }) => {
            const option = new Option(name, name);
            option.dataset.email = email;
            select.appendChild(option);
          });

          if (collaborators.length > 0) {
            select.selectedIndex = 0;
            onSelectChange();
          }

          hideLoader();
        }).getCollaborators();
      }

      function onSelectChange() {
        const select = document.getElementById('collabSelect');
        const selectedOption = select.options[select.selectedIndex];
        currentName = selectedOption.value;

        try {
          originalEmails = JSON.parse(selectedOption.dataset.email);
          if (!Array.isArray(originalEmails)) originalEmails = [selectedOption.dataset.email];
        } catch {
          originalEmails = selectedOption.dataset.email ? [selectedOption.dataset.email] : [];
        }

        renderEmailList();
      }

      function renderEmailList() {
        const ul = document.getElementById('emailList');
        ul.innerHTML = '';

        originalEmails.forEach((email, index) => {
          const li = document.createElement('li');
          li.innerHTML = `
            <span>${email}</span>
            <button class="email-remove" onclick="removeEmail(${index})">✖</button>
          `;
          ul.appendChild(li);
        });
      }

      function addEmail() {
        const input = document.getElementById('calendarInput');
        const newEmail = input.value.trim();

        if (newEmail && !originalEmails.includes(newEmail)) {
          originalEmails.push(newEmail);
          renderEmailList();
          input.value = '';
        }
      }

      function removeEmail(index) {
        originalEmails.splice(index, 1);
        renderEmailList();
      }

      function saveCalendar() {
        showLoader("Enregistrement du calendrier…");
        google.script.run.withSuccessHandler(() => {
          alert('Calendriers mis à jour ✅');
          hideLoader();
        }).updateCalendarEmail(currentName, JSON.stringify(originalEmails));
      }

      window.onload = loadCollaborators;
    </script>
  </body>
</html>
