<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    label { font-weight: bold; display: block; margin-top: 12px; }
    select { width: 100%; padding: 8px; margin-top: 6px; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; border: 1px solid #007fff; border-radius: 4px; }
    button { padding: 10px 18px; font-size: 14px; background-color: #007fff; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.3s ease; }
    button:hover { background-color: #0056b3; }
    .footer { text-align: right; font-size: 10px; color: #007fff; opacity: 0.5; margin-top: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loaderOverlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255,255,255,0.85);
      z-index: 9999;
      justify-content: center; align-items: center; flex-direction: column;
    }
    #loaderOverlay .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #007fff;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite;
    }
    #loaderOverlay .message {
      margin-top: 15px; font-weight: bold; color: #007fff;
    }
  </style>
</head>
<body>
  <div style="margin-bottom:16px; font-size:16px; font-weight:bold;">
    Vous êtes connecté en tant que : <span id="userName">...</span>
  </div>

  <label for="sheetSelect">Feuille à synchroniser :</label>
  <select id="sheetSelect"></select>

  <button onclick="syncSheet()">Synchroniser</button>

  <div class="footer">
    by <a href="https://utema.fr" target="_blank" style="color: #007fff; text-decoration: none;">Utema.fr</a>
  </div>

  <!-- Loader -->
  <div id="loaderOverlay">
    <div class="spinner"></div>
    <div id="loaderMessage" class="message">Chargement…</div>
  </div>

  <script>
    function showLoader(text) {
      document.getElementById('loaderMessage').innerText = text || 'Chargement…';
      document.getElementById('loaderOverlay').style.display = 'flex';
    }
    function hideLoader() {
      document.getElementById('loaderOverlay').style.display = 'none';
    }

    // Affiche l'email de l'utilisateur
    function showUser() {
      google.script.run.withSuccessHandler(function(email) {
        document.getElementById('userName').innerText = email || 'Utilisateur inconnu';
      }).getActiveUserEmail();
    }

    // Remplit les sheets dans le select
    function populateSheets() {
      showLoader('Chargement des feuilles…');
      google.script.run.withSuccessHandler(function(sheetNames) {
        const select = document.getElementById('sheetSelect');
        sheetNames.forEach(name => select.appendChild(new Option(name, name)));
        hideLoader();
      }).getSyncableSheets();
    }

    // Fonction principale déclenchée par le bouton “Synchroniser”
    function syncSheet() {
      const sheet = document.getElementById('sheetSelect').value;
      if (!sheet) return;

      // 1) Lance la mise à jour de la DB
      showLoader('Mise à jour de la DB…');
      google.script.run
        .withSuccessHandler(res => {
          // 2) Dès que la DB est à jour, on met à jour le texte du loader
          showLoader(
            `DB synchronisée : ${res.successCount} ✓, ${res.failCount} ✗\n` +
            `${res.remaining} modif(s) en attente – lancement de la sync Calendar…`
          );

          // 3) On déclenche directement la sync Calendar
          google.script.run
            .withSuccessHandler(stats => {
              // 4) On affiche le bilan Calendar dans le loader
              showLoader(
                `Calendrier synchronisé : ${stats.success} ✓, ${stats.failed} ✗\n` +
                `Fermeture automatique…`
              );
              // 5) On ferme la modal après un court délai
              setTimeout(() => google.script.host.close(), 1500);
            })
            .syncGoogleCalendarsForUser();
        })
        .triggerFullSyncForUser(sheet);
    }
    window.onload = function() {
      showUser();
      populateSheets();
    };
  </script>
</body>
</html>
