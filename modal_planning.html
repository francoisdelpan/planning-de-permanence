<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      label {
        display: block;
        margin-bottom: 6px;
      }
      select, input[type="text"] {
        padding: 8px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 14px;
      }
      button {
        padding: 10px 18px;
        font-size: 14px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <label for="startWeek">Semaine de début :</label>
    <select id="startWeek" onchange="updateEndWeek()"></select>

    <label for="endWeek">Semaine de fin (auto) :</label>
    <input type="text" id="endWeek" readonly>

    <button onclick="submit()">Créer le planning</button>

    <div style="text-align:right; font-size:10px; color:#007fff; opacity:0.5;">
      by <a href="https://utema.fr" target="_blank" style="color: #007fff; text-decoration: none;">Utema.fr</a>
    </div>

    <!-- Loader -->
    <div id="loaderOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(255,255,255,0.85); z-index: 9999; display: flex; justify-content: center;
        align-items: center; flex-direction: column;">
      <div style="border: 6px solid #f3f3f3; border-top: 6px solid #007fff; border-radius: 50%; width: 50px;
          height: 50px; animation: spin 1s linear infinite;"></div>
      <div id="loaderMessage" style="margin-top: 15px; font-weight: bold; color: #007fff;">Chargement…</div>
    </div>

    <script>
      let weekOptions = [];
      const MAX_WEEKS = parseInt(<?= maxWeeks ?>);

      hideLoader();

      function generateWeekOptions() {
        const today = new Date();
        const containerStart = document.getElementById("startWeek");
        weekOptions = [];

        const totalWeeks = 40;
        const selectableWeeks = totalWeeks - MAX_WEEKS;

        for (let i = 0; i < totalWeeks; i++) {
          let d = new Date(today);
          d.setDate(d.getDate() + i * 7);

          const { isoYear, isoWeek } = getISOYearAndWeek(d);
          const value = `${isoYear}-${isoWeek}`;
          const label = `S${isoWeek.toString().padStart(2, '0')} - ${isoYear}`;

          weekOptions.push({ value, label, year: isoYear, week: isoWeek });

          // On met dans le <select> uniquement les semaines de début possibles
          if (i < selectableWeeks) {
            const option = new Option(label, i); // valeur = index dans weekOptions[]
            containerStart.appendChild(option);
          }
        }

        containerStart.selectedIndex = 0;
        updateEndWeek();
      }

      function getISOYearAndWeek(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        const dayNum = date.getUTCDay() || 7;
        date.setUTCDate(date.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
        const isoWeek = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
        const isoYear = date.getUTCFullYear();
        return { isoYear, isoWeek };
      }

      function updateEndWeek() {
        const startIndex = parseInt(document.getElementById('startWeek').value, 10);

        if (startIndex + (MAX_WEEKS - 1) < weekOptions.length) {
          const end = weekOptions[startIndex + MAX_WEEKS - 1];
          document.getElementById('endWeek').value = `S${end.week.toString().padStart(2, '0')} - ${end.year}`;
          document.getElementById('endWeek').dataset.value = end.value;
        } else {
          document.getElementById('endWeek').value = 'Limite atteinte';
          document.getElementById('endWeek').dataset.value = '';
        }
      }

      function submit() {
        const startIndex = parseInt(document.getElementById('startWeek').value, 10);
        const start = weekOptions[startIndex]?.value || '';
        const end = document.getElementById('endWeek').dataset.value;

        if (!end || !start) {
          alert("Erreur : la sélection est invalide.");
          return;
        }

        showLoader("Création du planning...");

        google.script.run
          .withSuccessHandler(() => {
            hideLoader();
            google.script.host.close();
          })
          .withFailureHandler(err => {
            hideLoader();
            alert('Erreur : ' + err.message);
          })
          .generatePlanningBetweenYearWeeks(start, end);
      }

      window.onload = generateWeekOptions;


      function showLoader(message = "Chargement…") {
        document.getElementById("loaderMessage").innerText = message;
        document.getElementById("loaderOverlay").style.display = "flex";
      }

      function hideLoader() {
        document.getElementById("loaderOverlay").style.display = "none";
      }

    </script>
  </body>
</html>
