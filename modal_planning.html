<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        --brand: #2F5AEA;
        --brand-dark: #2447bb;
        --brand-soft: #eef3ff;
        --text: #162033;
        --muted: #6b7280;
        --border: #d9e2ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #fff;
        color: var(--text);
      }

      .page {
        padding: 18px 22px 18px;
      }

      .section-title {
        display: block;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--brand);
      }

      .field-card {
        margin-bottom: 14px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #fff;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      select,
      input[type="text"] {
        width: 100%;
        padding: 11px 12px;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      select:focus,
      input[type="text"]:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px rgba(47, 90, 234, 0.12);
        outline: none;
      }

      input[readonly] {
        background: #f8faff;
        color: var(--muted);
      }

      button {
        width: 100%;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 700;
        background: var(--brand);
        color: white;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(47, 90, 234, 0.22);
        transition: transform 0.15s ease, background 0.15s ease;
      }

      button:hover {
        background: var(--brand-dark);
        transform: translateY(-1px);
      }

      .signature {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: var(--brand);
      }

      .signature a {
        color: inherit;
        text-decoration: none;
        font-weight: 700;
      }

      #loaderOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255,255,255,0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .loader-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--brand-soft);
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 3px solid rgba(47, 90, 234, 0.2);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <span class="section-title">Planning</span>

      <div class="field-card">
        <label for="startWeek">Semaine de début</label>
        <select id="startWeek" onchange="updateEndWeek()"></select>
      </div>

      <div class="field-card">
        <label for="endWeek">Semaine de fin (auto)</label>
        <input type="text" id="endWeek" readonly>
      </div>

      <button onclick="submit()">Créer le planning</button>

      <div class="signature">
        <span>Made with &lt;3 by <a href="https://utema.fr" target="_blank">Utema</a>. 2026</span>
      </div>
    </div>

    <div id="loaderOverlay">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div id="loaderMessage">Chargement…</div>
      </div>
    </div>

    <script>
      let weekOptions = [];
      const MAX_WEEKS = parseInt(<?= maxWeeks ?>, 10);

      function generateWeekOptions() {
        const today = new Date();
        const containerStart = document.getElementById("startWeek");
        weekOptions = [];
        containerStart.innerHTML = "";

        const totalWeeks = 40;
        const selectableWeeks = totalWeeks - MAX_WEEKS;

        for (let i = 0; i < totalWeeks; i++) {
          let d = new Date(today);
          d.setDate(d.getDate() + i * 7);

          const { isoYear, isoWeek } = getISOYearAndWeek(d);
          const value = `${isoYear}-${isoWeek}`;
          const label = `S${isoWeek.toString().padStart(2, '0')} - ${isoYear}`;

          weekOptions.push({ value, label, year: isoYear, week: isoWeek });

          if (i < selectableWeeks) {
            const option = new Option(label, i);
            containerStart.appendChild(option);
          }
        }

        containerStart.selectedIndex = 0;
        updateEndWeek();
      }

      function getISOYearAndWeek(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        const dayNum = date.getUTCDay() || 7;
        date.setUTCDate(date.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
        const isoWeek = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
        const isoYear = date.getUTCFullYear();
        return { isoYear, isoWeek };
      }

      function updateEndWeek() {
        const startIndex = parseInt(document.getElementById("startWeek").value, 10);

        if (startIndex + (MAX_WEEKS - 1) < weekOptions.length) {
          const end = weekOptions[startIndex + MAX_WEEKS - 1];
          document.getElementById("endWeek").value = `S${end.week.toString().padStart(2, "0")} - ${end.year}`;
          document.getElementById("endWeek").dataset.value = end.value;
        } else {
          document.getElementById("endWeek").value = "Limite atteinte";
          document.getElementById("endWeek").dataset.value = "";
        }
      }

      function submit() {
        const startIndex = parseInt(document.getElementById("startWeek").value, 10);
        const start = weekOptions[startIndex]?.value || "";
        const end = document.getElementById("endWeek").dataset.value;

        if (!end || !start) {
          alert("Erreur : la sélection est invalide.");
          return;
        }

        showLoader("Création du planning...");

        google.script.run
          .withSuccessHandler(() => {
            hideLoader();
            google.script.host.close();
          })
          .withFailureHandler(err => {
            hideLoader();
            alert("Erreur : " + err.message);
          })
          .generatePlanningBetweenYearWeeks(start, end);
      }

      function showLoader(message = "Chargement…") {
        document.getElementById("loaderMessage").innerText = message;
        document.getElementById("loaderOverlay").style.display = "flex";
      }

      function hideLoader() {
        document.getElementById("loaderOverlay").style.display = "none";
      }

      window.onload = generateWeekOptions;
    </script>
  </body>
</html>
