<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      label {
        font-weight: bold;
        display: block;
        margin-top: 12px;
      }
      select, input[type="text"] {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        margin-bottom: 12px;
        box-sizing: border-box;
        font-size: 14px;
        border: 1px solid #007fff;
        border-radius: 4px;
      }
      .email-list {
        margin-top: 8px;
        padding-left: 0;
        list-style: none;
      }
      .email-list li {
        background: #f0f8ff;
        padding: 6px 10px;
        border-radius: 3px;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .email-list button {
        background: none;
        border: none;
        color: red;
        font-weight: bold;
        cursor: pointer;
      }
      button {
        padding: 10px 18px;
        font-size: 14px;
        background-color: #007fff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      button:hover:not([disabled]) {
        background-color: #0056b3;
      }
      button[disabled] {
        background-color: #ccc;
        cursor: not-allowed;
      }
      button.save {
        background-color: #28a745;
      }
      button.save:hover:not([disabled]) {
        background-color: #218838;
      }
      .footer {
        text-align: right;
        font-size: 10px;
        color: #007fff;
        opacity: 0.5;
        margin-top: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <label for="collabSelect">Collaborateur :</label>
    <select id="collabSelect" onchange="onSelectChange()"></select>

    <label for="calendarInput">Ajouter une adresse Calendar :</label>
    <input type="text" id="calendarInput" />
    <button onclick="addEmail()">➕ Ajouter</button>

    <ul id="emailList" class="email-list"></ul>

    <button id="saveBtn" class="save" onclick="saveCalendar()">Sauvegarder</button>

    <div class="footer">
      by <a href="https://utema.fr" target="_blank" style="color: #007fff; text-decoration: none;">Utema.fr</a>
    </div>

    <!-- Loader -->
    <div id="loaderOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255,255,255,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;">
      <div style="border: 6px solid #f3f3f3; border-top: 6px solid #007fff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
      <div id="loaderMessage" style="margin-top: 15px; font-weight: bold; color: #007fff;">Chargement…</div>
    </div>

    <script>
      let originalEmails = [];
      let currentName = '';

      function showLoader(message = "Chargement…") {
        document.getElementById("loaderMessage").innerText = message;
        document.getElementById("loaderOverlay").style.display = "flex";
      }

      function hideLoader() {
        document.getElementById("loaderOverlay").style.display = "none";
      }

      function loadCollaborators() {
        showLoader("Chargement des collaborateurs…");
        google.script.run.withSuccessHandler(function(collaborators) {
          const select = document.getElementById('collabSelect');
          collaborators.forEach(({ name, email }) => {
            const option = new Option(name, name);
            option.dataset.email = email;
            select.appendChild(option);
          });

          if (collaborators.length > 0) {
            select.selectedIndex = 0;
            onSelectChange();
          }
          hideLoader();
        }).getCollaborators();
      }

      function onSelectChange() {
        const select = document.getElementById('collabSelect');
        const selectedOption = select.options[select.selectedIndex];
        currentName = selectedOption.value;

        try {
          originalEmails = JSON.parse(selectedOption.dataset.email);
          if (!Array.isArray(originalEmails)) originalEmails = [selectedOption.dataset.email];
        } catch {
          originalEmails = selectedOption.dataset.email ? [selectedOption.dataset.email] : [];
        }

        renderEmailList();
      }

      function renderEmailList() {
        const ul = document.getElementById('emailList');
        ul.innerHTML = '';
        originalEmails.forEach((email, index) => {
          const li = document.createElement('li');
          li.innerHTML = `${email} <button onclick="removeEmail(${index})">✖</button>`;
          ul.appendChild(li);
        });
      }

      function addEmail() {
        const input = document.getElementById('calendarInput');
        const newEmail = input.value.trim();
        if (newEmail && !originalEmails.includes(newEmail)) {
          originalEmails.push(newEmail);
          renderEmailList();
          input.value = '';
        }
      }

      function removeEmail(index) {
        originalEmails.splice(index, 1);
        renderEmailList();
      }

      function saveCalendar() {
        showLoader("Enregistrement du calendrier…");
        google.script.run.withSuccessHandler(() => {
          alert('Calendriers mis à jour ✅');
          hideLoader();
        }).updateCalendarEmail(currentName, JSON.stringify(originalEmails));
      }

      window.onload = loadCollaborators;
    </script>
  </body>
</html>
