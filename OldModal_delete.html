<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      margin-bottom: 20px;
      box-sizing: border-box;
      font-size: 14px;
      border: 1px solid #007fff;
      border-radius: 4px;
    }

    button {
      padding: 10px 18px;
      font-size: 14px;
      background-color: #007fff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    .footer {
      text-align: right;
      font-size: 10px;
      color: #007fff;
      opacity: 0.5;
      margin-top: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <label for="sheetSelect">Feuille à supprimer :</label>
  <select id="sheetSelect"></select>

  <button onclick="deleteSheet()">Supprimer</button>

  <div class="footer">
    by <a href="https://utema.fr" target="_blank" style="color: #007fff; text-decoration: none;">Utema.fr</a>
  </div>

  <!-- Loader -->
  <div id="loaderOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255,255,255,0.85); z-index: 9999; display: flex; justify-content: center;
      align-items: center; flex-direction: column;">
    <div style="border: 6px solid #f3f3f3; border-top: 6px solid #007fff; border-radius: 50%; width: 50px;
        height: 50px; animation: spin 1s linear infinite;"></div>
    <div id="loaderMessage" style="margin-top: 15px; font-weight: bold; color: #007fff;">Chargement…</div>
  </div>

  <script>
    function showLoader(message = "Chargement…") {
      document.getElementById("loaderMessage").innerText = message;
      document.getElementById("loaderOverlay").style.display = "flex";
    }

    function hideLoader() {
      document.getElementById("loaderOverlay").style.display = "none";
    }

    function populateSheets() {
      showLoader("Chargement des feuilles…");
      google.script.run.withSuccessHandler(function(sheetNames) {
        const select = document.getElementById('sheetSelect');
        sheetNames.forEach(name => {
          const option = new Option(name, name);
          select.appendChild(option);
        });
        hideLoader();
      }).getDeletableSheets();
    }

    function deleteSheet() {
      const selectedSheet = document.getElementById('sheetSelect').value;
      if (!selectedSheet) return;

      showLoader("Suppression en cours…");
      google.script.run.withSuccessHandler(() => {
        hideLoader();
        google.script.host.close();
      }).deleteSheetAndCleanup(selectedSheet);
    }

    window.onload = populateSheets;
  </script>

</body>
</html>
